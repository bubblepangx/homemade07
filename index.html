<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="무음 카메라">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<meta name="description" content="무음 카메라 - Silent Camera PWA">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<title>무음 카메라</title>
<style>
/* ==============================================
   무음 카메라 v3.0
   - 앱 내 갤러리 저장 (IndexedDB)
   - 한번에 내보내기
   - 카메라 세션 유지 (재허용 안 물음)
   ============================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --ui-bg:rgba(0,0,0,0.35);
  --ui-bg-solid:rgba(20,20,22,0.92);
  --accent:#f0c040;
  --text:#fff;
  --text-dim:rgba(255,255,255,0.55);
  --capture-size:72px;
}
html,body{
  width:100%;height:100%;overflow:hidden;background:#000;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Helvetica Neue',sans-serif;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
}

/* ---- Permission Screen ---- */
#permScreen{
  position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#0a0a0c;transition:opacity .4s;
}
#permScreen.hidden{opacity:0;pointer-events:none}
#permScreen .icon-cam{
  width:80px;height:80px;margin-bottom:28px;border-radius:20px;
  background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;
}
#permScreen h1{font-size:22px;font-weight:600;margin-bottom:10px}
#permScreen p{font-size:14px;color:var(--text-dim);margin-bottom:36px;text-align:center;line-height:1.5;padding:0 40px}
#permBtn{
  background:var(--accent);color:#000;border:none;padding:14px 48px;border-radius:50px;
  font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,opacity .15s;
}
#permBtn:active{transform:scale(.95);opacity:.8}

/* ---- Camera ---- */
#cameraLayer{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden}
#preview{width:100%;height:100%;object-fit:cover;transform-origin:center center;transition:filter .25s}
#captureCanvas{display:none}
#flash{position:fixed;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s}
#flash.fire{opacity:.65}

/* ---- Gesture Layer ---- */
#gestureLayer{position:fixed;inset:0;z-index:10;touch-action:none}

/* ---- Top Bar ---- */
#topBar{
  position:fixed;top:0;left:0;right:0;z-index:30;
  padding:calc(var(--safe-top) + 8px) 16px 8px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,.5) 0%,transparent 100%);pointer-events:none;
}
#topBar>*{pointer-events:auto}
.top-btn{
  width:40px;height:40px;border-radius:50%;background:var(--ui-bg);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#fff;transition:background .2s;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);touch-action:manipulation;
}
.top-btn:active{background:rgba(255,255,255,.2)}
.top-btn svg{width:22px;height:22px}
#zoomBadge{
  background:var(--ui-bg);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  padding:5px 14px;border-radius:20px;font-size:14px;font-weight:600;
  font-variant-numeric:tabular-nums;min-width:52px;text-align:center;
}

/* ---- Zoom Arc ---- */
#zoomArc{
  position:fixed;right:8px;top:50%;transform:translateY(-50%);z-index:25;
  width:56px;height:300px;touch-action:none;
}
#zoomArcSvg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 0 6px rgba(0,0,0,.5))}
.arc-track{fill:none;stroke:rgba(255,255,255,.15);stroke-width:3;stroke-linecap:round}
.arc-progress{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round}
.arc-thumb{fill:#fff;stroke:var(--accent);stroke-width:2.5;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5))}
.arc-label{fill:rgba(255,255,255,.5);font-size:9px;font-weight:600;text-anchor:end}

/* ---- Filter Carousel ---- */
#filterBar{
  position:fixed;bottom:calc(var(--safe-bottom) + 100px);left:0;right:0;z-index:25;
  overflow-x:auto;overflow-y:hidden;white-space:nowrap;padding:8px 16px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;
}
#filterBar::-webkit-scrollbar{display:none}
.filter-chip{
  display:inline-flex;align-items:center;justify-content:center;
  padding:6px 16px;margin-right:8px;border-radius:20px;
  border:1.5px solid rgba(255,255,255,.15);background:rgba(0,0,0,.4);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  color:var(--text-dim);font-size:12px;font-weight:500;cursor:pointer;
  transition:all .2s;touch-action:manipulation;
}
.filter-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(240,192,64,.12)}
.filter-chip:active{transform:scale(.95)}

/* ---- Bottom Bar ---- */
#bottomBar{
  position:fixed;bottom:0;left:0;right:0;z-index:25;
  padding:12px 24px calc(var(--safe-bottom) + 14px);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 100%);touch-action:manipulation;
}
/* Gallery button (replaces thumbnail) */
#galleryBtn{
  width:48px;height:48px;border-radius:10px;border:2px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.05);cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  touch-action:manipulation;transition:transform .2s;
}
#galleryBtn:active{transform:scale(.92)}
#galleryBtn img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
#galleryBtn svg{width:24px;height:24px;color:rgba(255,255,255,.4)}
#photoBadge{
  position:absolute;top:-6px;right:-6px;
  background:var(--accent);color:#000;font-size:10px;font-weight:700;
  min-width:20px;height:20px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  padding:0 5px;
}
#photoBadge.hide{display:none}

/* Capture */
#captureBtn{
  width:var(--capture-size);height:var(--capture-size);border-radius:50%;
  border:4px solid rgba(255,255,255,.8);background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:transform .12s;
  position:relative;touch-action:manipulation;
}
#captureBtn::after{
  content:'';position:absolute;inset:5px;border-radius:50%;
  background:rgba(255,255,255,.9);transition:transform .1s,background .1s;
}
#captureBtn:active::after{transform:scale(.88);background:var(--accent)}
#captureBtn.burst::after{transform:scale(.85);background:var(--accent)}
#switchBtn{
  width:48px;height:48px;border-radius:50%;background:var(--ui-bg);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  transition:transform .3s,background .2s;touch-action:manipulation;
}
#switchBtn:active{background:rgba(255,255,255,.2)}
#switchBtn svg{width:24px;height:24px;color:#fff;transition:transform .4s}
#switchBtn.flip svg{transform:rotate(180deg)}

/* ---- Toast ---- */
#toast{
  position:fixed;top:calc(var(--safe-top) + 60px);left:50%;
  transform:translateX(-50%) translateY(-20px);z-index:100;
  background:var(--ui-bg-solid);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;
  opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;
  display:flex;align-items:center;gap:6px;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .check{color:#4cd964;font-size:16px}

/* ---- Grid ---- */
#gridOverlay{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity .3s}

/* ============================================
   GALLERY OVERLAY
   ============================================ */
#gallery{
  position:fixed;inset:0;z-index:200;background:#0a0a0c;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,.36,1);
  display:flex;flex-direction:column;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
}
#gallery.open{transform:translateY(0)}

/* Gallery header */
.gal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.08);
}
.gal-header h2{font-size:17px;font-weight:600}
.gal-close{
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;
  touch-action:manipulation;
}
.gal-close:active{background:rgba(255,255,255,.2)}
.gal-count{font-size:13px;color:var(--text-dim)}

/* Gallery grid */
.gal-grid{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:4px;display:grid;
  grid-template-columns:repeat(3,1fr);gap:2px;
  align-content:start;
}
.gal-grid::-webkit-scrollbar{display:none}
.gal-item{
  aspect-ratio:1;position:relative;cursor:pointer;overflow:hidden;
  border-radius:2px;background:rgba(255,255,255,.03);
}
.gal-item img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.gal-item:active img{transform:scale(.95)}
.gal-item .sel-check{
  position:absolute;top:6px;right:6px;width:24px;height:24px;
  border-radius:50%;border:2px solid rgba(255,255,255,.6);
  background:transparent;display:flex;align-items:center;justify-content:center;
  transition:all .15s;pointer-events:none;
}
.gal-item.selected .sel-check{
  background:var(--accent);border-color:var(--accent);
}
.gal-item.selected .sel-check::after{
  content:'✓';color:#000;font-size:14px;font-weight:700;
}

/* Gallery toolbar */
.gal-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.08);
}
.gal-btn{
  padding:10px 20px;border-radius:24px;border:none;cursor:pointer;
  font-size:14px;font-weight:600;transition:all .15s;touch-action:manipulation;
}
.gal-btn:active{transform:scale(.95)}
.gal-btn-select{background:rgba(255,255,255,.1);color:#fff}
.gal-btn-share{background:var(--accent);color:#000}
.gal-btn-share:disabled{opacity:.35;cursor:default}
.gal-btn-delete{background:rgba(255,60,60,.15);color:#ff4040}
.gal-btn-delete:disabled{opacity:.35;cursor:default}

/* Empty gallery */
.gal-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;color:var(--text-dim);gap:12px;
}
.gal-empty svg{width:48px;height:48px;opacity:.3}
.gal-empty p{font-size:14px}

/* ---- Photo viewer ---- */
#viewer{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.95);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#viewer.open{opacity:1;pointer-events:auto}
#viewer img{max-width:100%;max-height:100%;object-fit:contain}
#viewerClose{
  position:fixed;top:calc(var(--safe-top) + 12px);right:16px;z-index:301;
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;
}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>
</head>

<!-- Permission Screen -->
<div id="permScreen">

      <rect x="6" y="14" width="36" height="24" rx="4"/><circle cx="24" cy="26" r="7"/>

  </button>

<script>
/* ==========================================================
   무음 카메라 v3.0 — 앱 내 갤러리 + 한번에 내보내기
   
   ✅ 찍으면 IndexedDB에 즉시 저장 (터치 0번, 공유시트 안 뜸)
   ✅ 갤러리에서 선택 후 한번에 내보내기
   ✅ 앱 켜있는 동안 카메라 재허용 안 물음
   ✅ iOS Safari ctx.filter 미지원 → 수동 픽셀 필터
   ========================================================== */

// ===================================================
//  IndexedDB — 사진 저장소
// ===================================================
const DB_NAME = 'SilentCameraDB';
const DB_VER = 1;
const STORE = 'photos';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}

function savePhotoToDB(blob, thumbBlob) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    const record = { blob, thumb: thumbBlob, ts: Date.now() };
    const req = store.add(record);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

function getAllPhotos() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

function getPhoto(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

function deletePhotos(ids) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    ids.forEach(id => store.delete(id));
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

function countPhotos() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).count();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(0);
  });
}

// ===================================================
//  Filters (CSS preview + manual pixel for capture)
// ===================================================
const FILTERS = {
  none:{ css:'none', apply:null, pp:null },
  kodak:{

// ===================================================
//  Zoom Arc
// ===================================================
const ARC={p0:{x:32,y:284},p1:{x:52,y:150},p2:{x:32,y:16}};
function bzP(t){const u=1-t;return{x:u*u*ARC.p0.x+2*u*t*ARC.p1.x+t*t*ARC.p2.x,y:u*u*ARC.p0.y+2*u*t*ARC.p1.y+t*t*ARC.p2.y}}
function z2t(z){return Math.log(z/S.minZoom)/Math.log(S.maxZoom/S.minZoom)}
function t2z(t){t=Math.max(0,Math.min(1,t));return S.minZoom*Math.pow(S.maxZoom/S.minZoom,t)}

function updateZoomUI(){
  const t=z2t(S.zoom),pt=bzP(t);
  arcThumb.setAttribute('cx',pt.x);arcThumb.setAttribute('cy',pt.y);
  let d=`M ${ARC.p0.x} ${ARC.p0.y}`;
  const steps=20,maxI=Math.ceil(steps*t);
  for(let i=1;i<=maxI;i++){const p=bzP(Math.min(i/steps,t));d+=` L ${p.x.toFixed(1)} ${p.y.toFixed(1)}`;}
  arcProgress.setAttribute('d',d);
  zoomBadge.textContent=S.zoom<10?S.zoom.toFixed(1)+'×':Math.round(S.zoom)+'×';
  video.style.transform=(S.isFront?'scaleX(-1) ':'')+'scale('+S.zoom+')';
}

function setZoom(z){
  S.zoom=Math.max(S.minZoom,Math.min(S.maxZoom,z));
  if(S.nativeZoom&&S.torchTrack)try{S.torchTrack.applyConstraints({advanced:[{zoom:Math.min(S.zoom,S.nativeMax)}]})}catch(e){}
  updateZoomUI();
}

// ===================================================
//  Camera — 세션 유지, 재허용 방지
// ===================================================
async function startCamera(){
  if(S.stream){S.stream.getTracks().forEach(t=>t.stop());S.stream=null;}
  try{
    S.stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:S.facingMode,width:{ideal:4096},height:{ideal:3072}},audio:false
    });
    video.srcObject=S.stream;
    await video.play();
    const track=S.stream.getVideoTracks()[0];
    S.torchTrack=track;
    const caps=track.getCapabilities?track.getCapabilities():{};
    if(caps.zoom){S.nativeZoom=true;S.nativeMax=caps.zoom.max||10;S.maxZoom=Math.max(20,S.nativeMax);}
    else{S.nativeZoom=false;S.maxZoom=20;}
    S.zoom=1;updateZoomUI();applyFilter(S.currentFilter);
    console.log('📷 Camera:',video.videoWidth+'x'+video.videoHeight);
  }catch(err){
    console.error('Camera error:',err);
    showToast('카메라를 열 수 없습니다');
  }
}

// 백그라운드/포그라운드 시 트랙만 on/off (스트림 유지 → 재허용 안 물음)
document.addEventListener('visibilitychange',()=>{
  if(!S.stream)return;
  S.stream.getTracks().forEach(t=>{t.enabled=!document.hidden;});
  // 포그라운드 복귀 시 스트림이 끊겼으면 재연결
  if(!document.hidden){
    const track=S.stream.getVideoTracks()[0];
    if(!track||track.readyState==='ended'){
      console.log('Track ended, reconnecting...');
      startCamera();
    }
  }
});

// ===================================================
//  Filter apply (canvas, Safari-safe)
// ===================================================
function applyFilterCanvas(canvasEl,fCtx,w,h,name){
  const f=FILTERS[name];if(!f||!f.apply)return;
  const total=w*h,LIM=2000000;
  if(total>LIM){
    const r=Math.sqrt(LIM/total),sw=Math.round(w*r),sh=Math.round(h*r);
    const tmp=document.createElement('canvas');tmp.width=sw;tmp.height=sh;
    const tc=tmp.getContext('2d');tc.drawImage(canvasEl,0,0,sw,sh);
    const id=tc.getImageData(0,0,sw,sh);f.apply(id.data);tc.putImageData(id,0,0);
    fCtx.drawImage(tmp,0,0,w,h);
  }else{
    const id=fCtx.getImageData(0,0,w,h);f.apply(id.data);fCtx.putImageData(id,0,0);
  }
}
function addGrain(ctx,w,h,int){
  const gs=256,tmp=document.createElement('canvas');tmp.width=gs;tmp.height=gs;
  const tc=tmp.getContext('2d'),id=tc.createImageData(gs,gs),dd=id.data,amt=int*120;
  for(let i=0;i<dd.length;i+=4){const n=(Math.random()-.5)*amt;dd[i]=dd[i+1]=dd[i+2]=128+n;dd[i+3]=Math.min(255,Math.abs(n)*2.5);}
  tc.putImageData(id,0,0);
  ctx.globalCompositeOperation='overlay';ctx.globalAlpha=int;
  ctx.drawImage(tmp,0,0,w,h);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
}
function addVignette(ctx,w,h,str){
  const m=Math.max(w,h),g=ctx.createRadialGradient(w/2,h/2,m*.2,w/2,h/2,m*.7);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${str})`);
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
}

// ===================================================
//  Thumbnail 생성 (갤러리용 작은 이미지)
// ===================================================
function createThumbBlob(sourceCanvas, maxSize=200){
  return new Promise(resolve=>{
    const tw=sourceCanvas.width,th=sourceCanvas.height;
    const ratio=Math.min(maxSize/tw,maxSize/th);
    const w=Math.round(tw*ratio),h=Math.round(th*ratio);
    const tmp=document.createElement('canvas');tmp.width=w;tmp.height=h;
    tmp.getContext('2d').drawImage(sourceCanvas,0,0,w,h);
    tmp.toBlob(b=>resolve(b),'image/jpeg',0.7);
  });
}

// ===================================================
//  Photo Capture — 터치 0번 자동 저장!
// ===================================================
async function capturePhoto(){
  if(S.capturing||!S.stream)return;
  S.capturing=true;
  flash.classList.add('fire');captureBtn.classList.add('burst');
  if(navigator.vibrate)navigator.vibrate(10);

  const vw=video.videoWidth,vh=video.videoHeight;
  if(!vw||!vh){S.capturing=false;flash.classList.remove('fire');captureBtn.classList.remove('burst');showToast('카메라 준비 중...');return;}

  const cropW=vw/S.zoom,cropH=vh/S.zoom;
  const cropX=(vw-cropW)/2,cropY=(vh-cropH)/2;
  const outW=Math.round(cropW),outH=Math.round(cropH);
  canvas.width=outW;canvas.height=outH;
  ctx.filter='none';

  if(S.isFront){ctx.save();ctx.translate(outW,0);ctx.scale(-1,1);ctx.drawImage(video,cropX,cropY,cropW,cropH,0,0,outW,outH);ctx.restore();}
  else ctx.drawImage(video,cropX,cropY,cropW,cropH,0,0,outW,outH);

  applyFilterCanvas(canvas,ctx,outW,outH,S.currentFilter);
  const pp=FILTERS[S.currentFilter]?.pp;
  if(pp==='gh'){addGrain(ctx,outW,outH,.18);addVignette(ctx,outW,outH,.55);}
  else if(pp==='gl'){addGrain(ctx,outW,outH,.08);addVignette(ctx,outW,outH,.3);}
  else if(pp==='vl')addVignette(ctx,outW,outH,.2);

  setTimeout(()=>{flash.classList.remove('fire');captureBtn.classList.remove('burst');},100);

  // 고화질 JPEG blob + 썸네일 blob 동시 생성
  canvas.toBlob(async(blob)=>{
    if(!blob){S.capturing=false;return;}
    try{
      const thumbBlob=await createThumbBlob(canvas);
      const id=await savePhotoToDB(blob,thumbBlob);

      // 갤러리 버튼에 최신 썸네일 표시
      if(S.prevThumbUrl)URL.revokeObjectURL(S.prevThumbUrl);
      const url=URL.createObjectURL(thumbBlob);
      S.prevThumbUrl=url;
      galleryThumb.src=url;galleryThumb.style.display='block';

      S.photoCount++;updateBadge();
      showToast(`저장됨 (${S.photoCount}장)`);
    }catch(e){console.error('Save error:',e);showToast('저장 실패');}
    S.capturing=false;
  },'image/jpeg',0.95);
}

function updateBadge(){
  photoBadge.textContent=S.photoCount;
  photoBadge.classList.toggle('hide',S.photoCount===0);
}

async function renderGallery(){
  const photos=await getAllPhotos();
  S.photoCount=photos.length;updateBadge();
  galCount.textContent=photos.length+'장';
  galGrid.innerHTML='';
  galEmpty.style.display=photos.length?'none':'flex';

  // 최신순 정렬
  photos.sort((a,b)=>b.ts-a.ts);

  for(const p of photos){
    const div=document.createElement('div');
    div.className='gal-item';div.dataset.id=p.id;
    const img=document.createElement('img');
    img.src=URL.createObjectURL(p.thumb||p.blob);
    img.loading='lazy';
    const check=document.createElement('div');check.className='sel-check';
    div.appendChild(img);div.appendChild(check);
    galGrid.appendChild(div);
  }
}

function toggleSelectItem(id){
  if(S.selectedIds.has(id))S.selectedIds.delete(id);
  else S.selectedIds.add(id);
  updateGalButtons();
  // UI 업데이트
  galGrid.querySelectorAll('.gal-item').forEach(el=>{
    el.classList.toggle('selected',S.selectedIds.has(Number(el.dataset.id)));
  });
}

function selectAll(){
  const items=galGrid.querySelectorAll('.gal-item');
  const allSelected=S.selectedIds.size===items.length;
  S.selectedIds.clear();
  if(!allSelected)items.forEach(el=>S.selectedIds.add(Number(el.dataset.id)));
  items.forEach(el=>el.classList.toggle('selected',S.selectedIds.has(Number(el.dataset.id))));
  galSelectBtn.textContent=allSelected?'전체 선택':'선택 해제';
  updateGalButtons();
}

function updateGalButtons(){
  const n=S.selectedIds.size;
  galShareBtn.disabled=n===0;
  galDeleteBtn.disabled=n===0;
  galShareBtn.textContent=n?`내보내기 (${n})`:'내보내기';
  galDeleteBtn.textContent=n?`삭제 (${n})`:'삭제';
}

// 내보내기: Web Share API로 선택된 사진 일괄 전송
async function shareSelected(){
  if(S.selectedIds.size===0)return;
  const files=[];
  for(const id of S.selectedIds){
    const p=await getPhoto(id);
    if(p)files.push(new File([p.blob],`silent_${p.ts}.jpg`,{type:'image/jpeg'}));
  }
  if(navigator.canShare&&navigator.canShare({files})){
    try{
      await navigator.share({files,title:'무음 카메라'});
      showToast('내보내기 완료!');
    }catch(e){if(e.name!=='AbortError')showToast('내보내기 실패');}
  }else{
    // 폴백: 하나씩 다운로드
    for(const f of files){
      const url=URL.createObjectURL(f);
      const a=document.createElement('a');a.href=url;a.download=f.name;
      document.body.appendChild(a);a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
    }
    showToast(`${files.length}장 다운로드됨`);
  }
}

async function deleteSelected(){
  if(S.selectedIds.size===0)return;
  const n=S.selectedIds.size;
  if(!confirm(`${n}장을 삭제할까요?`))return;
  await deletePhotos([...S.selectedIds]);
  S.selectedIds.clear();
  await renderGallery();
  showToast(`${n}장 삭제됨`);
}

// ===================================================
//  Gestures
// ===================================================
let pinchD=0,pinchZ=1,isPinch=false;
gestureLayer.addEventListener('touchstart',e=>{
  if(e.touches.length===2){isPinch=true;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinchD=Math.hypot(dx,dy);pinchZ=S.zoom;e.preventDefault();}else isPinch=false;
},{passive:false});
gestureLayer.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&isPinch&&pinchD>0){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;setZoom(pinchZ*Math.hypot(dx,dy)/pinchD);e.preventDefault();}
},{passive:false});
gestureLayer.addEventListener('touchend',e=>{if(e.touches.length<2){isPinch=false;pinchD=0;}});

const zoomArcEl=$('zoomArc');let arcDrag=false;
function handleArc(e){const r=zoomArcEl.getBoundingClientRect(),touch=e.touches?e.touches[0]:e;setZoom(t2z(1-Math.max(0,Math.min(1,(touch.clientY-r.top)/r.height))));}
zoomArcEl.addEventListener('touchstart',e=>{arcDrag=true;handleArc(e);e.preventDefault();e.stopPropagation();},{passive:false});
zoomArcEl.addEventListener('touchmove',e=>{if(arcDrag){handleArc(e);e.preventDefault();e.stopPropagation();}},{passive:false});
zoomArcEl.addEventListener('touchend',()=>{arcDrag=false;});
zoomArcEl.addEventListener('touchcancel',()=>{arcDrag=false;});
let lastArcTap=0;zoomArcEl.addEventListener('click',()=>{const n=Date.now();if(n-lastArcTap<300)setZoom(1);lastArcTap=n;});

// ===================================================
//  Event Bindings
// ===================================================
permBtn.addEventListener('click',async()=>{
  try{await startCamera();permScreen.classList.add('hidden');setTimeout(()=>{permScreen.style.display='none';},400);}
  catch(e){showToast('카메라 권한을 허용해주세요');}
});
captureBtn.addEventListener('click',e=>{e.stopPropagation();capturePhoto();});
switchBtn.addEventListener('click',e=>{e.stopPropagation();switchCamera();});
flashBtn.addEventListener('click',e=>{e.stopPropagation();toggleFlash();});
gridBtn.addEventListener('click',e=>{e.stopPropagation();toggleGrid();});
filterBar.addEventListener('click',e=>{const c=e.target.closest('.filter-chip');if(c)applyFilter(c.dataset.filter);});

// Gallery button
galleryBtn.addEventListener('click',()=>openGallery());
galClose.addEventListener('click',()=>closeGallery());
galSelectBtn.addEventListener('click',()=>selectAll());
galShareBtn.addEventListener('click',()=>shareSelected());
galDeleteBtn.addEventListener('click',()=>deleteSelected());

// Gallery grid events (tap=select, long press or double tap=view)
let galTapTimer=null, galLastTap=0;
galGrid.addEventListener('click',e=>{
  const item=e.target.closest('.gal-item');if(!item)return;
  const id=Number(item.dataset.id);
  const now=Date.now();
  if(now-galLastTap<300){
    // Double tap → open viewer
    openViewer(id);
  }else{
    // Single tap → toggle selection
    toggleSelectItem(id);
  }
  galLastTap=now;
});

// Viewer
viewerClose.addEventListener('click',()=>closeViewer());
viewer.addEventListener('click',e=>{if(e.target===viewer)closeViewer();});

// ===================================================
//  Init
// ===================================================
(async()=>{
  // DB 초기화
  await openDB();
  S.photoCount=await countPhotos();updateBadge();

  // 마지막 사진 썸네일 표시
  if(S.photoCount>0){
    try{
      const all=await getAllPhotos();
      const last=all[all.length-1];
      if(last&&last.thumb){
        const url=URL.createObjectURL(last.thumb);
        S.prevThumbUrl=url;galleryThumb.src=url;galleryThumb.style.display='block';
      }
    }catch(e){}
  }

  // 카메라 자동 시작 시도
  try{
    const r=await navigator.permissions.query({name:'camera'});
    if(r.state==='granted'){
      await startCamera();
      permScreen.classList.add('hidden');
      setTimeout(()=>{permScreen.style.display='none';},400);
    }
  }catch(e){console.log('Permissions API N/A');}
})();

if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('gesturestart',e=>e.preventDefault());

console.log('🔇 무음 카메라 v3.0 Ready!');
</script>
