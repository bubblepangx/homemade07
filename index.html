<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="무음 카메라">
<meta name="theme-color" content="#E8E1D8">
<title>무음 카메라</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+KR:wght@200;300;400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #E8E1D8;
  --warm-bg: #E3DCD3;
  --sand: #D5CCBF;
  --stone: #C4B9AA;
  --sage: #B5BCA8;
  --sage-deep: #9AA68E;
  --sage-muted: #C8CEBD;
  --dusty-rose: #CFBBB4;
  --rose-deep: #B89E96;
  --terracotta: #C0926E;
  --terracotta-muted: #CBAA91;
  --blush: #D8C4BC;
  --fog: #C5CDD4;
  --fog-deep: #A8B3BC;
  --olive: #8A8B6E;
  --brown: #8B7D6B;
  --brown-deep: #6B5B4E;
  --brown-light: #A09080;
  --text: #5C4F42;
  --text-light: #9A8E82;
  --text-faint: #B5AA9E;
  --white-90: rgba(255,255,255,.9);
  --white-60: rgba(255,255,255,.6);
  --white-30: rgba(255,255,255,.3);
  --white-12: rgba(255,255,255,.12);
  --black-30: rgba(0,0,0,.3);
  --black-15: rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
html,body{overscroll-behavior:none;overflow:hidden;height:100%;width:100%;touch-action:manipulation;background:#2A2520}
body{display:flex;justify-content:center;align-items:center}

#app{
  width:100%;max-width:430px;height:100vh;height:100dvh;max-height:932px;
  position:relative;overflow:hidden;background:var(--cream);
  font-family:'DM Sans','Noto Serif KR',sans-serif;color:var(--text);
}
@media(min-width:431px){#app{border-radius:36px;box-shadow:0 24px 80px rgba(40,32,24,.35)}}

/* === SCREENS === */
.scr{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .4s ease,transform .4s ease;transform:translateY(8px);will-change:opacity,transform}
.scr.on{opacity:1;pointer-events:auto;transform:translateY(0)}

/* === GLASS === */
.glass{background:rgba(232,225,216,.82);-webkit-backdrop-filter:blur(32px) saturate(1.2);backdrop-filter:blur(32px) saturate(1.2)}
.glass-dark{background:rgba(44,38,32,.4);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}

/* === ANIM === */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes flashCap{0%{opacity:.8}100%{opacity:0}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.05);opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes panelSlide{from{opacity:0;max-height:0}to{opacity:1;max-height:320px}}
@keyframes gentleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* === RANGE === */
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-track{height:1.5px;background:var(--stone);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--dusty-rose);border:3px solid var(--cream);margin-top:-8px;box-shadow:0 1px 8px rgba(0,0,0,.12)}
input[type=range]::-moz-range-track{height:1.5px;background:var(--stone);border-radius:2px;border:none}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--dusty-rose);border:3px solid var(--cream);box-shadow:0 1px 8px rgba(0,0,0,.12)}

/* ========== PERMISSION SCREEN ========== */
#permScr{
  position:absolute;inset:0;z-index:300;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--cream);text-align:center;padding:48px 36px;
}
#permScr.gone{display:none}
.perm-lens{
  width:100px;height:100px;border-radius:50%;
  border:1.5px solid var(--stone);
  display:flex;align-items:center;justify-content:center;margin-bottom:28px;
  position:relative;
}
.perm-lens::after{
  content:'';width:62px;height:62px;border-radius:50%;
  background:radial-gradient(circle at 40% 38%,var(--sage-muted),var(--dusty-rose) 70%,var(--terracotta-muted));
  opacity:.35;
}
.perm-title{
  font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;
  color:var(--brown-deep);letter-spacing:1px;margin-bottom:6px;line-height:1.2;
}
.perm-sub{
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;
  font-style:italic;color:var(--brown-light);margin-bottom:28px;
}
.perm-desc{font-size:13px;color:var(--text-light);line-height:1.8;margin-bottom:32px;max-width:260px}
.perm-btn{
  padding:15px 44px;border-radius:28px;border:none;cursor:pointer;
  background:var(--sage);color:#fff;font-size:14px;font-weight:400;
  font-family:'DM Sans',sans-serif;letter-spacing:.5px;
  box-shadow:0 4px 20px rgba(145,155,130,.3);transition:all .25s;
}
.perm-btn:active{transform:scale(.96);box-shadow:0 2px 10px rgba(145,155,130,.2)}
.perm-note{font-size:11px;color:var(--text-faint);margin-top:16px;line-height:1.6}

/* ========== CAMERA ========== */
#viewfinder{flex:1;position:relative;overflow:hidden;background:#1E1B18}
#camVid{width:100%;height:100%;object-fit:cover;transition:filter .4s ease}
#camVid.mirror{transform:scaleX(-1)}
.grid-ov{position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity .3s}
.grid-ov.on{opacity:1}
.grid-ov div{position:absolute;background:rgba(255,255,255,.15)}
.grid-ov .gv{width:1px;top:0;bottom:0}.grid-ov .gh{height:1px;left:0;right:0}
.grid-ov .gv:nth-child(1){left:33.33%}.grid-ov .gv:nth-child(2){left:66.66%}
.grid-ov .gh:nth-child(3){top:33.33%}.grid-ov .gh:nth-child(4){top:66.66%}
#flashOv{position:absolute;inset:0;background:#FFF8F0;opacity:0;pointer-events:none;z-index:50}
#flashOv.on{animation:flashCap .22s ease forwards}
#timerOv{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:40;background:rgba(30,27,24,.3)}
#timerOv.on{display:flex}
#timerOv span{font-size:84px;font-weight:300;color:rgba(255,248,240,.85);font-family:'Cormorant Garamond',serif;animation:breathe 1s ease infinite}

/* Top bar */
.cam-top{
  position:absolute;top:0;left:0;right:0;z-index:20;
  padding:max(env(safe-area-inset-top),46px) 16px 10px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,rgba(30,27,24,.45) 0%,transparent 100%);
}
.cam-top .brand{
  font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:400;
  color:rgba(255,248,240,.4);letter-spacing:3px;
}
.top-grp{display:flex;gap:6px}
.t-btn{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:rgba(255,248,240,.7);border:1px solid rgba(255,248,240,.15);
  background:rgba(255,248,240,.06);cursor:pointer;transition:all .2s;
  font-family:'DM Sans',sans-serif;-webkit-user-select:none;
}
.t-btn:active,.t-btn.on{background:rgba(255,248,240,.18);border-color:rgba(255,248,240,.3)}
#shotBadge{
  position:absolute;top:calc(max(env(safe-area-inset-top),46px) + 42px);right:16px;z-index:20;
  padding:3px 11px;border-radius:16px;font-size:10px;color:rgba(255,248,240,.55);
  background:rgba(30,27,24,.25);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  display:none;letter-spacing:.5px;
}
#fLabel{
  position:absolute;left:50%;transform:translateX(-50%);z-index:20;
  font-size:10px;color:rgba(255,248,240,.35);letter-spacing:2.5px;
  text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:300;
  transition:bottom .4s,opacity .3s;opacity:0;
}

/* Zoom */
.zoom-row{position:absolute;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:6px;transition:bottom .4s ease}
.z-btn{
  width:36px;height:36px;border-radius:50%;font-size:10.5px;font-weight:500;
  color:rgba(255,248,240,.65);display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,248,240,.12);background:rgba(30,27,24,.3);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);cursor:pointer;transition:all .25s;
  font-family:'DM Sans',sans-serif;
}
.z-btn.on{background:rgba(255,248,240,.18);border-color:rgba(255,248,240,.35);color:rgba(255,248,240,.9)}

/* === BOTTOM === */
.cam-bot{position:relative}
.panel{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .35s;opacity:0;border-bottom:1px solid rgba(196,185,170,.1)}
.panel.open{max-height:320px;opacity:1}
.panel-in{padding:14px 0 6px}

/* Filter cats */
.fcat-row{display:flex;gap:3px;padding:0 14px;margin-bottom:10px;overflow-x:auto}
.fcat{
  padding:5px 13px;border-radius:16px;font-size:11px;font-weight:400;
  color:var(--text-light);border:none;background:transparent;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;
}
.fcat.on{background:var(--sage-muted);color:var(--brown-deep)}

/* Filter items */
.fg-row{display:flex;gap:10px;padding:0 16px;overflow-x:auto}
.f-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;border:none;background:none;-webkit-user-select:none}
.f-thumb{
  width:52px;height:52px;border-radius:16px;border:2px solid transparent;
  transition:all .25s;overflow:hidden;position:relative;
}
.f-thumb.on{border-color:var(--sage-deep)}
.f-name{font-size:9.5px;font-family:'DM Sans',sans-serif;color:var(--text-light);transition:all .2s;font-weight:400}
.f-name.on{color:var(--brown-deep);font-weight:500}
.str-row{display:flex;align-items:center;gap:10px;padding:8px 20px 2px}
.str-row span{font-size:10px;color:var(--text-faint);min-width:28px;font-family:'DM Sans',sans-serif}

/* Beauty */
.bp-row{display:flex;gap:5px;padding:0 12px;overflow-x:auto;margin-bottom:10px}
.bp{
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;
  border-radius:14px;min-width:56px;cursor:pointer;border:none;background:none;
  transition:all .2s;flex-shrink:0;font-family:inherit;
}
.bp.on{background:var(--sage-muted)}
.bp .ico{font-size:21px}
.bp .nm{font-size:9.5px;color:var(--text-light);transition:all .2s}
.bp.on .nm{color:var(--brown-deep);font-weight:500}
.sl-row{display:flex;align-items:center;gap:8px;padding:0 16px;margin-bottom:7px}
.sl-row label{font-size:10px;color:var(--text-light);min-width:36px;text-align:right;font-family:'DM Sans',sans-serif}
.sl-row .v{font-size:10px;color:var(--brown);min-width:22px;text-align:right;font-family:'DM Sans',sans-serif}

/* Main control */
.main-row{display:flex;align-items:center;justify-content:space-between;padding:14px 28px 8px}
#thumbBtn{
  width:44px;height:44px;border-radius:14px;border:2px solid var(--sand);
  background:var(--stone);background-size:cover;background-position:center;
  cursor:pointer;transition:transform .15s;
}
#thumbBtn:active{transform:scale(.93)}

/* Shutter */
.shut-out{
  width:72px;height:72px;border-radius:50%;
  border:2.5px solid var(--stone);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .12s;position:relative;
}
.shut-out:active{transform:scale(.91)}
.shut-in{
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 45% 40%,var(--cream),var(--sand));
  box-shadow:0 2px 12px rgba(0,0,0,.06),inset 0 1px 4px rgba(255,255,255,.7);
  transition:background .3s;
}
.shut-out.rec .shut-in{
  background:radial-gradient(circle at 45% 40%,var(--dusty-rose),var(--rose-deep));
  animation:breathe 1.5s ease infinite;
}
.flip-btn{
  width:44px;height:44px;border-radius:14px;
  background:rgba(196,185,170,.08);border:1px solid var(--sand);
  display:flex;align-items:center;justify-content:center;
  font-size:19px;color:var(--brown);cursor:pointer;transition:all .2s;
}
.flip-btn:active{transform:rotate(180deg)}

/* Mode tabs */
.mode-row{display:flex;justify-content:center;gap:24px;padding:5px 0 max(env(safe-area-inset-bottom),14px)}
.m-tab{
  font-size:10.5px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-faint);font-weight:400;padding-bottom:3px;
  border:none;border-bottom:1.5px solid transparent;background:none;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .25s;
}
.m-tab.on{color:var(--brown-deep);font-weight:500;border-bottom-color:var(--sage)}

/* ========== EDIT ========== */
.ed-top{
  padding:max(env(safe-area-inset-top),46px) 18px 10px;
  display:flex;justify-content:space-between;align-items:center;
}
.ed-top button{font-size:13px;color:var(--brown);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif}
.ed-top .sav{color:var(--sage-deep);font-weight:600}
.ed-top .ttl{font-size:11px;letter-spacing:3px;color:var(--text-light);text-transform:uppercase;font-family:'Cormorant Garamond',serif;font-weight:400}
.ed-prev{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--warm-bg);overflow:hidden}
#editCvs{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 6px 28px rgba(0,0,0,.08)}
.ed-tools{border-top:1px solid rgba(196,185,170,.12)}
.ed-tabs{display:flex;border-bottom:1px solid rgba(196,185,170,.08)}
.ed-tab{
  flex:1;padding:10px 0;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-faint);font-weight:400;cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;transition:all .2s;
}
.ed-tab.on{color:var(--brown-deep);font-weight:500;border-bottom-color:var(--sage)}
.ed-panel{padding:12px 16px max(env(safe-area-inset-bottom),18px);min-height:115px;animation:fadeIn .2s ease}

/* Text */
.txt-row{display:flex;gap:7px;margin-bottom:10px}
.txt-row input{
  flex:1;padding:9px 14px;border-radius:20px;
  background:rgba(196,185,170,.1);border:1px solid var(--sand);
  color:var(--text);font-size:13px;outline:none;font-family:inherit;
}
.txt-row button{
  padding:9px 18px;border-radius:20px;background:var(--sage);
  color:#fff;font-size:12px;border:none;cursor:pointer;font-family:inherit;
}
.fn-row,.cl-row{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.fn-b{
  padding:5px 11px;border-radius:14px;font-size:10px;cursor:pointer;
  border:1px solid var(--sand);background:transparent;color:var(--text-light);
  transition:all .2s;font-family:inherit;
}
.fn-b.on{background:var(--sage-muted);color:var(--brown-deep);border-color:var(--sage-muted)}
.cl-d{
  width:24px;height:24px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:all .2s;
}
.cl-d.on{border-color:var(--sage-deep);box-shadow:0 0 0 2px var(--cream),0 0 0 4px var(--sage-deep)}

/* Sticker */
.stk-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.stk-grid button{
  aspect-ratio:1;border-radius:12px;background:rgba(196,185,170,.06);
  border:1px solid rgba(196,185,170,.08);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.stk-grid button:active{background:var(--sage-muted);transform:scale(.92)}

/* Frame */
.frm-row{display:flex;gap:10px;overflow-x:auto}
.frm-i{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;border:none;background:none}
.frm-th{
  width:48px;height:62px;border-radius:6px;
  background:linear-gradient(145deg,var(--stone),var(--brown));
  transition:outline .2s;
}
.frm-th.on{outline:2.5px solid var(--sage-deep);outline-offset:3px}
.frm-i span{font-size:9.5px;color:var(--text-light);font-family:'DM Sans',sans-serif}

/* ========== AI ========== */
.ai-prev{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--warm-bg)}
.ai-box{
  width:100%;max-width:260px;aspect-ratio:3/4;border-radius:20px;
  box-shadow:0 12px 40px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;
  background-size:cover;background-position:center;transition:all .5s;position:relative;overflow:hidden;
  background-color:var(--sand);
}
.ai-spin{width:36px;height:36px;border:2px solid var(--sand);border-top-color:var(--sage);border-radius:50%;animation:spin 1s linear infinite}
.ai-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.ai-s{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px;border-radius:16px;border:1.5px solid rgba(196,185,170,.12);
  cursor:pointer;background:none;transition:all .25s;font-family:inherit;
}
.ai-s.on{background:var(--sage-muted);border-color:var(--sage)}
.ai-s .ico{font-size:22px}
.ai-s .lb{font-size:9.5px;color:var(--text-light);transition:all .2s}
.ai-s.on .lb{color:var(--brown-deep);font-weight:500}
.ai-btn{
  width:100%;padding:13px;border-radius:24px;border:none;cursor:pointer;
  background:var(--sage);color:#fff;font-size:13px;font-weight:400;
  font-family:'DM Sans',sans-serif;letter-spacing:1px;transition:all .25s;
  box-shadow:0 4px 16px rgba(145,155,130,.25);
}
.ai-btn:disabled{background:var(--sand);color:var(--text-faint);box-shadow:none}

/* ========== GALLERY ========== */
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2.5px;padding:8px}
.gal-grid button{
  aspect-ratio:1;border-radius:4px;background-size:cover;background-position:center;
  border:none;cursor:pointer;transition:all .15s;
}
.gal-grid button:active{transform:scale(.96);opacity:.85}
.gal-det{padding:16px;animation:fadeIn .3s}
.gal-det img{width:100%;border-radius:10px;box-shadow:0 6px 28px rgba(0,0,0,.08);margin-bottom:16px}
.gal-acts{display:flex;gap:7px;justify-content:center}
.gal-acts button{
  padding:10px 22px;border-radius:20px;font-size:11.5px;cursor:pointer;
  border:none;font-family:'DM Sans',sans-serif;transition:all .2s;letter-spacing:.3px;
}

/* Home bar */
.h-bar{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;z-index:100;pointer-events:none;transition:background .3s}

/* Install banner */
#instBnr{
  position:absolute;bottom:80px;left:14px;right:14px;padding:16px 18px;
  border-radius:20px;z-index:200;display:none;align-items:center;gap:12px;
  animation:slideUp .4s ease;border:1px solid var(--sand);
}
#instBnr .tx{flex:1;font-size:12px;color:var(--brown-deep);line-height:1.5}
#instBnr .tx strong{display:block;font-size:13px;margin-bottom:2px;font-family:'Cormorant Garamond',serif;font-weight:500}
#instBnr .ib{padding:8px 16px;border-radius:16px;background:var(--sage);color:#fff;font-size:12px;border:none;cursor:pointer;font-family:inherit}
#instBnr .cb{width:26px;height:26px;border-radius:50%;background:rgba(196,185,170,.12);border:none;cursor:pointer;font-size:12px;color:var(--brown);display:flex;align-items:center;justify-content:center}

/* === EMPTY === */
.empty{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px}
.empty span:first-child{font-size:36px;opacity:.25}
.empty span:last-child{font-size:13px;color:var(--text-faint);font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div id="app">

<!-- ========== PERMISSION ========== -->
<div id="permScr">
  <div class="perm-lens"></div>
  <div class="perm-title">무음 카메라</div>

  <div class="tx"><strong>홈 화면에 추가</strong>앱처럼 바로 실행할 수 있어요</div>

</div>

<script>
const ST={
  stream:null,facing:'environment',zoom:1,grid:false,timer:0,
  iv:false,ivId:null,shots:0,photos:[],
  fCat:'basic',aFilter:'original',fStr:100,
  fOpen:false,bOpen:false,
  bPreset:null,skin:0,vline:0,eyes:0,
  eIdx:-1,eBri:0,eCon:0,eSat:0,eTxts:[],eStks:[],eFrame:'none',
  eFont:0,eCol:0,eTab:'adjust',
  aiSt:null,aiProc:false,galDet:-1,dPr:null,
};

// === FILTERS ===
const F={
  basic:{name:'기본',items:[{id:'original',name:'Original',css:'none'}]},
  mood:{name:'감성',items:[
    {id:'clarendon',name:'Clarendon',css:'contrast(1.2) saturate(1.35)'},
    {id:'valencia',name:'Valencia',css:'sepia(.15) saturate(1.2) brightness(1.08)'},
    {id:'juno',name:'Juno',css:'saturate(1.4) contrast(1.1) brightness(1.05)'},
    {id:'lark',name:'Lark',css:'brightness(1.15) saturate(.9) contrast(1.1)'},
    {id:'vsco_a6',name:'VSCO A6',css:'sepia(.25) saturate(1.1) brightness(1.05) contrast(.95)'},
    {id:'vsco_c1',name:'VSCO C1',css:'saturate(.8) brightness(1.1) sepia(.1)'},
    {id:'vsco_f2',name:'VSCO F2',css:'contrast(.9) brightness(1.12) sepia(.2) saturate(1.15)'},
    {id:'fade',name:'Fade',css:'contrast(.85) brightness(1.15) saturate(.8)'},
  ]},
  film:{name:'필름',items:[
    {id:'s70',name:"70's",css:'sepia(.4) saturate(1.3) contrast(1.1) brightness(.95)'},
    {id:'s80',name:"80's",css:'saturate(1.5) contrast(1.2) hue-rotate(10deg)'},
    {id:'s2k',name:"2000's",css:'contrast(1.1) saturate(1.2) brightness(1.1)'},
    {id:'retro',name:'Retro',css:'sepia(.35) contrast(1.15) brightness(.95)'},
    {id:'cinema',name:'Cinema',css:'contrast(1.3) saturate(.85) brightness(.92)'},
    {id:'polaroid',name:'Polaroid',css:'sepia(.2) brightness(1.1) contrast(.9) saturate(1.1)'},
    {id:'grain',name:'Grain',css:'contrast(1.15) brightness(.98) saturate(.9)'},
  ]},
  japan:{name:'日本',items:[
    {id:'jp_vint',name:'Vintage',css:'sepia(.3) saturate(.85) brightness(1.05)'},
    {id:'sakura',name:'Sakura',css:'brightness(1.1) saturate(1.1) hue-rotate(-10deg) sepia(.1)'},
    {id:'wabisabi',name:'Wabi-Sabi',css:'saturate(.6) contrast(.95) brightness(1.05) sepia(.15)'},
    {id:'fuji',name:'Fuji',css:'saturate(1.15) contrast(1.05) brightness(1.08) sepia(.08)'},
    {id:'neon',name:'Neon',css:'saturate(1.6) contrast(1.25) brightness(1.05)'},
    {id:'kyoto',name:'Kyoto',css:'sepia(.2) saturate(.9) brightness(1.08) contrast(.95)'},
    {id:'mono',name:'Mono',css:'saturate(.7) contrast(1.05) sepia(.25) brightness(1.02)'},
  ]},
  art:{name:'아트',items:[
    {id:'webtoon',name:'Webtoon',css:'contrast(1.5) saturate(1.3) brightness(1.1)'},
    {id:'ghibli',name:'Ghibli',css:'saturate(1.3) brightness(1.12) sepia(.12) contrast(.95)'},
    {id:'ukiyoe',name:'浮世絵',css:'sepia(.35) saturate(1.4) contrast(1.2)'},
    {id:'jp_anime',name:'Anime',css:'saturate(1.5) contrast(1.3) brightness(1.08)'},
    {id:'kr_anime',name:'K-Anime',css:'saturate(1.35) contrast(1.2) brightness(1.1)'},
    {id:'manga',name:'Manga',css:'grayscale(.9) contrast(1.6) brightness(1.05)'},
    {id:'popart',name:'Pop Art',css:'saturate(2) contrast(1.4) brightness(1.05)'},
    {id:'watercolor',name:'Watercolor',css:'saturate(.8) brightness(1.15) contrast(.85) sepia(.1)'},
  ]},
  id_photo:{name:'증명',items:[
    {id:'id_std',name:'증명사진',css:'contrast(1.05) brightness(1.08) saturate(.95)'},
    {id:'passport',name:'여권',css:'contrast(1.08) brightness(1.1) saturate(.9)'},
    {id:'studio',name:'사진관',css:'contrast(1.1) brightness(1.05) saturate(1.05)'},
    {id:'profile',name:'프로필',css:'brightness(1.12) contrast(1.02) saturate(1.05)'},
  ]},
};
const BP=[
  {id:'maiden',name:'Maiden',ico:'🌸'},{id:'mist',name:'Mist',ico:'🌫️'},
  {id:'mint',name:'Mint',ico:'🍃'},{id:'soft',name:'Soft',ico:'☁️'},
  {id:'nature',name:'Nature',ico:'🌿'},{id:'cream',name:'Cream',ico:'🍦'},
  {id:'peach',name:'Peach',ico:'🍑'},{id:'charisma',name:'Charisma',ico:'✦'},
];
const STK=['✿','♡','☆','♪','◇','△','○','⬡','❋','✧','♤','⚘','❁','✺','◉','⬢','♧','❀','✾','❃','✤','❊','⊛','✦','⊕'];
const FRM=[
  {id:'none',name:'None',b:''},
  {id:'simple',name:'Simple',b:'3px solid rgba(255,255,255,.65)'},
  {id:'pink',name:'Pink',b:'4px solid rgba(207,187,180,.7)'},
  {id:'vintage',name:'Vintage',b:'6px solid rgba(196,185,170,.6)'},
  {id:'neon',name:'Neon',b:'2px solid rgba(181,188,168,.7)'},
  {id:'gold',name:'Gold',b:'4px solid rgba(192,146,110,.6)'},
  {id:'booth',name:'Booth',b:'13px solid #FAF6F1'},
];
const AIS=[
  {id:'wr',name:'로맨스',ico:'💕'},{id:'wf',name:'판타지',ico:'⚔️'},
  {id:'gb',name:'지브리',ico:'🌿'},{id:'cb',name:'치비',ico:'🎀'},
  {id:'px',name:'픽셀아트',ico:'👾'},{id:'3d',name:'3D',ico:'🧸'},
  {id:'y2k',name:'Y2K',ico:'💿'},{id:'ap',name:'AI프로필',ico:'📸'},
];
const EF=['Georgia,serif',"'DM Sans',sans-serif",'monospace','cursive','Impact,sans-serif'];
const EFN=['Serif','Sans','Mono','Script','Bold'];
const EC=['#fff','#000','#CFBBB4','#B5BCA8','#C0926E','#C25B56','#8A8B6E','#8B7D6B','#9B8EC1','#E8D5B7'];

// === CAMERA ===
async function reqCam(){
  try{
    ST.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:ST.facing,width:{ideal:1920},height:{ideal:1080}},audio:false});
    document.getElementById('camVid').srcObject=ST.stream;
    document.getElementById('permScr').classList.add('gone');
    goScr('cam');buildAll();
  }catch(e){alert('카메라 접근 권한이 필요합니다.\n브라우저 설정에서 허용해주세요.')}
}
async function flipCam(){
  ST.facing=ST.facing==='environment'?'user':'environment';
  if(ST.stream)ST.stream.getTracks().forEach(t=>t.stop());
  try{
    ST.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:ST.facing,width:{ideal:1920},height:{ideal:1080}},audio:false});
    const v=document.getElementById('camVid');v.srcObject=ST.stream;
    v.classList.toggle('mirror',ST.facing==='user');
  }catch(e){}
}

// === CAPTURE ===
function capture(){
  const v=document.getElementById('camVid'),c=document.getElementById('capCvs');
  const w=v.videoWidth,h=v.videoHeight;c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  const all=Object.values(F).flatMap(x=>x.items);
  const fi=all.find(x=>x.id===ST.aFilter);
  ctx.filter=fi&&fi.css!=='none'?fi.css:'none';
  if(ST.facing==='user'){ctx.translate(w,0);ctx.scale(-1,1)}
  ctx.drawImage(v,0,0,w,h);ctx.setTransform(1,0,0,1,0,0);
  const d=c.toDataURL('image/jpeg',.92);
  ST.photos.unshift(d);ST.shots++;updBadge();updThumb();
  const fl=document.getElementById('flashOv');fl.classList.remove('on');void fl.offsetWidth;fl.classList.add('on');
  autoDl(d);
}
function autoDl(d){const a=document.createElement('a');a.href=d;a.download=`무음카메라_${Date.now()}.jpg`;a.click()}
function hShut(){
  if(ST.timer>0){
    const ov=document.getElementById('timerOv'),n=document.getElementById('tNum');
    ov.classList.add('on');let c=ST.timer;n.textContent=c;
    const iv=setInterval(()=>{c--;if(c<=0){clearInterval(iv);ov.classList.remove('on');capture()}else n.textContent=c},1000);
  }else capture();
}

// === BUILD UI ===
function buildAll(){buildZoom();buildFCats();buildFGrid();buildBP();buildBS();buildAIS();updBadge()}

function buildZoom(){
  const r=document.getElementById('zRow');r.innerHTML='';
  [1,2,3].forEach(z=>{const b=document.createElement('button');b.className=`z-btn${ST.zoom===z?' on':''}`;b.textContent=z+'.0';b.onclick=()=>setZ(z);r.appendChild(b)});
  posZ();
}
function setZ(z){
  ST.zoom=z;const v=document.getElementById('camVid');
  v.style.transform=(ST.facing==='user'?'scaleX(-1) ':'')+`scale(${z})`;
  buildZoom();
}
function posZ(){
  const r=document.getElementById('zRow'),l=document.getElementById('fLabel');
  const b=(ST.fOpen||ST.bOpen)?300:180;
  r.style.bottom=b+'px';l.style.bottom=(b+42)+'px';
}

function buildFCats(){
  const el=document.getElementById('fCats');el.innerHTML='';
  Object.entries(F).forEach(([k,c])=>{
    const b=document.createElement('button');b.className=`fcat${ST.fCat===k?' on':''}`;
    b.textContent=c.name;b.onclick=()=>{ST.fCat=k;buildFCats();buildFGrid()};el.appendChild(b);
  });
}
function buildFGrid(){
  const el=document.getElementById('fGrid');el.innerHTML='';
  (F[ST.fCat]?.items||[]).forEach(f=>{
    const w=document.createElement('button');w.className='f-item';w.onclick=()=>selF(f.id);
    const th=document.createElement('div');th.className=`f-thumb${ST.aFilter===f.id?' on':''}`;
    // Use seasonal palette colors for thumbnails
    const palettes={
      basic:'linear-gradient(135deg,#D5CCBF,#C4B9AA)',
      mood:'linear-gradient(135deg,#CFBBB4,#B5BCA8)',
      film:'linear-gradient(135deg,#C0926E,#8B7D6B)',
      japan:'linear-gradient(135deg,#D8C4BC,#C5CDD4)',
      art:'linear-gradient(135deg,#B5BCA8,#C0926E)',
      id_photo:'linear-gradient(135deg,#E8E1D8,#D5CCBF)',
    };
    th.style.background=palettes[ST.fCat]||palettes.basic;
    if(f.css!=='none')th.style.filter=f.css;
    const nm=document.createElement('span');nm.className=`f-name${ST.aFilter===f.id?' on':''}`;nm.textContent=f.name;
    w.appendChild(th);w.appendChild(nm);el.appendChild(w);
  });
}
function selF(id){
  ST.aFilter=id;const v=document.getElementById('camVid');
  if(id==='original'){v.style.filter=''}
  else{const all=Object.values(F).flatMap(x=>x.items);const f=all.find(x=>x.id===id);if(f)v.style.filter=f.css}
  buildFGrid();
  document.getElementById('strRow').style.display=id==='original'?'none':'flex';
  const l=document.getElementById('fLabel');l.textContent=id==='original'?'':id.replace(/_/g,' ');l.style.opacity=id==='original'?'0':'1';
}
function setStr(v){ST.fStr=+v;document.getElementById('strV').textContent=v+'%'}

function buildBP(){
  const el=document.getElementById('bpRow');el.innerHTML='';
  BP.forEach(p=>{
    const b=document.createElement('button');b.className=`bp${ST.bPreset===p.id?' on':''}`;
    b.innerHTML=`<span class="ico">${p.ico}</span><span class="nm">${p.name}</span>`;
    b.onclick=()=>{ST.bPreset=p.id;buildBP()};el.appendChild(b);
  });
}
function buildBS(){
  const el=document.getElementById('bSliders');el.innerHTML='';
  [{l:'Skin',k:'skin',v:ST.skin},{l:'V-Line',k:'vline',v:ST.vline},{l:'Eyes',k:'eyes',v:ST.eyes}].forEach(s=>{
    const r=document.createElement('div');r.className='sl-row';
    r.innerHTML=`<label>${s.l}</label><input type="range" min="0" max="100" value="${s.v}" oninput="ST.${s.k}=+this.value;this.nextElementSibling.textContent=this.value"><span class="v">${s.v}</span>`;
    el.appendChild(r);
  });
}

// === MODES ===
function tgMode(m){
  if(m==='filter'){ST.fOpen=!ST.fOpen;ST.bOpen=false}
  else if(m==='beauty'){ST.bOpen=!ST.bOpen;ST.fOpen=false}
  document.querySelectorAll('.m-tab').forEach(t=>{
    if(t.dataset.m==='filter')t.classList.toggle('on',ST.fOpen);
    if(t.dataset.m==='beauty')t.classList.toggle('on',ST.bOpen);
  });
  document.getElementById('fPnl').classList.toggle('open',ST.fOpen);
  document.getElementById('bPnl').classList.toggle('open',ST.bOpen);
  posZ();
}
function tgGrid(){ST.grid=!ST.grid;document.getElementById('gridOv').classList.toggle('on',ST.grid);document.getElementById('gBtn').classList.toggle('on',ST.grid)}
function cycTm(){
  ST.timer=ST.timer===0?3:ST.timer===3?5:ST.timer===5?10:0;
  document.getElementById('tmLbl').textContent=ST.timer>0?ST.timer+'s':'⏱';
  document.getElementById('tmBtn').classList.toggle('on',ST.timer>0);
}
function tgIv(){
  ST.iv=!ST.iv;const b=document.getElementById('ivBtn');b.classList.toggle('on',ST.iv);
  b.textContent=ST.iv?'●':'◎';
  if(ST.iv){ST.ivId=setInterval(()=>capture(),15000);document.getElementById('shutBtn').classList.add('rec')}
  else{clearInterval(ST.ivId);document.getElementById('shutBtn').classList.remove('rec')}
}
function updBadge(){const b=document.getElementById('shotBadge'),n=document.getElementById('shotN');if(ST.shots>0){b.style.display='block';n.textContent=ST.shots+' shots'}}
function updThumb(){const b=document.getElementById('thumbBtn');if(ST.photos.length)b.style.backgroundImage=`url(${ST.photos[0]})`}

// === SCREEN NAV ===
function goScr(n){
  const m={cam:'camScr',ed:'edScr',ai:'aiScr',gal:'galScr'};
  Object.values(m).forEach(id=>{const el=document.getElementById(id);el.classList.toggle('on',id===m[n]);});
  document.getElementById('hBar').style.background=n==='cam'?'rgba(255,248,240,.12)':'rgba(196,185,170,.18)';
  if(n==='gal')buildGal();if(n==='ai')buildAiPrev();
}

// === EDIT ===
function goEditLast(){if(!ST.photos.length){alert('먼저 사진을 촬영해주세요!');return}openEd(0)}
function openEd(i){
  ST.eIdx=i;ST.eBri=0;ST.eCon=0;ST.eSat=0;ST.eTxts=[];ST.eStks=[];ST.eFrame='none';ST.eTab='adjust';
  goScr('ed');setTimeout(()=>renderEd(),80);swEdTab('adjust');
}
function renderEd(){
  const cvs=document.getElementById('editCvs'),ctx=cvs.getContext('2d'),img=new Image();
  img.onload=()=>{
    const mW=380,mH=480;let w=img.width,h=img.height;const r=Math.min(mW/w,mH/h,1);w*=r;h*=r;
    cvs.width=w;cvs.height=h;
    let fs='';if(ST.eBri)fs+=`brightness(${1+ST.eBri/100}) `;if(ST.eCon)fs+=`contrast(${1+ST.eCon/100}) `;if(ST.eSat)fs+=`saturate(${1+ST.eSat/100}) `;
    ctx.filter=fs||'none';ctx.drawImage(img,0,0,w,h);ctx.filter='none';
    ST.eStks.forEach(s=>{ctx.font='26px serif';ctx.fillText(s.e,s.x*w/100,s.y*h/100)});
    ST.eTxts.forEach(t=>{ctx.font=`500 ${t.s||16}px ${EF[t.f||0]}`;ctx.fillStyle=t.c||'#fff';ctx.shadowColor='rgba(0,0,0,.35)';ctx.shadowBlur=4;ctx.fillText(t.t,t.x*w/100,t.y*h/100);ctx.shadowBlur=0});
    const fr=FRM.find(f=>f.id===ST.eFrame);cvs.style.border=fr&&fr.b?fr.b:'none';
  };img.src=ST.photos[ST.eIdx];
}
function swEdTab(tab){
  ST.eTab=tab;document.querySelectorAll('.ed-tab').forEach(t=>t.classList.toggle('on',t.dataset.t===tab));
  const p=document.getElementById('edPnl');
  if(tab==='adjust'){
    p.innerHTML='';
    [{l:'Brightness',i:'☀',k:'eBri'},{l:'Contrast',i:'◐',k:'eCon'},{l:'Saturation',i:'◕',k:'eSat'}].forEach(s=>{
      const r=document.createElement('div');r.className='sl-row';
      r.innerHTML=`<span style="font-size:15px;min-width:20px">${s.i}</span><label>${s.l}</label><input type="range" min="-100" max="100" value="${ST[s.k]}" oninput="ST.${s.k}=+this.value;this.nextElementSibling.textContent=(this.value>0?'+':'')+this.value;renderEd()"><span class="v">${ST[s.k]>0?'+':''}${ST[s.k]}</span>`;
      p.appendChild(r);
    });
  }else if(tab==='text'){
    p.innerHTML=`<div class="txt-row"><input id="txIn" placeholder="텍스트를 입력하세요..." /><button onclick="addTx()">추가</button></div>
    <div class="fn-row">${EFN.map((f,i)=>`<button class="fn-b${ST.eFont===i?' on':''}" onclick="ST.eFont=${i};swEdTab('text')">${f}</button>`).join('')}</div>
    <div class="cl-row">${EC.map((c,i)=>`<button class="cl-d${ST.eCol===i?' on':''}" style="background:${c}" onclick="ST.eCol=${i};swEdTab('text')"></button>`).join('')}</div>`;
  }else if(tab==='sticker'){
    p.innerHTML=`<div class="stk-grid">${STK.map(s=>`<button onclick="addStk('${s}')">${s}</button>`).join('')}</div>`;
  }else if(tab==='frame'){
    p.innerHTML=`<div class="frm-row">${FRM.map(f=>`<button class="frm-i" onclick="ST.eFrame='${f.id}';renderEd();swEdTab('frame')"><div class="frm-th${ST.eFrame===f.id?' on':''}" style="${f.b?'border:'+f.b:''}"></div><span>${f.name}</span></button>`).join('')}</div>`;
  }
}
function addTx(){const i=document.getElementById('txIn');if(!i||!i.value.trim())return;ST.eTxts.push({t:i.value.trim(),x:15+Math.random()*50,y:20+Math.random()*50,f:ST.eFont,c:EC[ST.eCol],s:16});i.value='';renderEd()}
function addStk(e){ST.eStks.push({e,x:20+Math.random()*60,y:20+Math.random()*60});renderEd()}
function saveEd(){const cvs=document.getElementById('editCvs');const d=cvs.toDataURL('image/jpeg',.92);ST.photos.unshift(d);updThumb();autoDl(d);goScr('cam')}

// === AI ===
function buildAIS(){
  const el=document.getElementById('aiGrid');el.innerHTML='';
  AIS.forEach(s=>{
    const b=document.createElement('button');b.className=`ai-s${ST.aiSt===s.id?' on':''}`;
    b.innerHTML=`<span class="ico">${s.ico}</span><span class="lb">${s.name}</span>`;
    b.onclick=()=>{ST.aiSt=s.id;buildAIS();document.getElementById('aiBtn').disabled=false};
    el.appendChild(b);
  });
}
function buildAiPrev(){
  const box=document.getElementById('aiBox');
  if(ST.photos.length){box.style.backgroundImage=`url(${ST.photos[0]})`;box.innerHTML=''}
  else{box.style.background='var(--sand)';box.innerHTML='<span style="font-size:13px;color:var(--text-light)">촬영 후 사용 가능</span>'}
}
function aiGen(){
  if(!ST.aiSt||!ST.photos.length)return;ST.aiProc=true;
  const box=document.getElementById('aiBox'),btn=document.getElementById('aiBtn');
  btn.disabled=true;btn.textContent='변환 중...';
  const st=AIS.find(s=>s.id===ST.aiSt);
  box.innerHTML='<div style="text-align:center"><div class="ai-spin"></div><p style="margin-top:12px;font-size:12px;color:var(--text-light);letter-spacing:1px">Transforming...</p></div>';
  setTimeout(()=>{
    ST.aiProc=false;btn.disabled=false;btn.textContent='Generate';
    box.innerHTML=`<div style="position:absolute;inset:0;background:rgba(181,188,168,.25);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;animation:fadeIn .5s"><span style="font-size:44px">${st.ico}</span><span style="font-size:14px;color:var(--brown-deep);font-weight:500;font-family:'Cormorant Garamond',serif">${st.name}</span><span style="font-size:10px;color:var(--text-light)">변환 완료 ✓</span></div>`;
  },2500);
}

// === GALLERY ===
function buildGal(){
  const el=document.getElementById('galBody'),cnt=document.getElementById('galCnt');
  cnt.textContent=ST.photos.length+' photos';
  if(ST.galDet>=0&&ST.galDet<ST.photos.length){
    el.innerHTML='';const d=document.createElement('div');d.className='gal-det';
    const img=document.createElement('img');img.src=ST.photos[ST.galDet];d.appendChild(img);
    const acts=document.createElement('div');acts.className='gal-acts';
    acts.innerHTML=`<button style="background:rgba(196,185,170,.1);color:var(--brown);border:1px solid var(--sand)" onclick="ST.galDet=-1;buildGal()">뒤로</button>
    <button style="background:var(--sage);color:#fff" onclick="openEd(ST.galDet)">편집</button>
    <button style="background:rgba(196,185,170,.1);color:var(--brown)" onclick="sharePh(ST.galDet)">공유</button>
    <button style="background:rgba(197,130,130,.1);color:#B06060" onclick="delPh(ST.galDet)">삭제</button>`;
    d.appendChild(acts);el.appendChild(d);
  }else{
    if(!ST.photos.length){el.innerHTML='<div class="empty"><span>📷</span><span>촬영한 사진이 없습니다</span></div>';return}
    const g=document.createElement('div');g.className='gal-grid';
    ST.photos.forEach((p,i)=>{const b=document.createElement('button');b.style.backgroundImage=`url(${p})`;b.onclick=()=>{ST.galDet=i;buildGal()};g.appendChild(b)});
    el.innerHTML='';el.appendChild(g);
  }
}
function delPh(i){ST.photos.splice(i,1);ST.galDet=-1;updThumb();buildGal()}
function sharePh(i){if(navigator.share){fetch(ST.photos[i]).then(r=>r.blob()).then(b=>{const f=new File([b],'무음카메라.jpg',{type:'image/jpeg'});navigator.share({files:[f]}).catch(()=>{})}).catch(()=>autoDl(ST.photos[i]))}else autoDl(ST.photos[i])}

// === PWA ===
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();ST.dPr=e;setTimeout(()=>{document.getElementById('instBnr').style.display='flex'},3000)});
function instApp(){if(ST.dPr){ST.dPr.prompt();ST.dPr.userChoice.then(()=>{ST.dPr=null;hideInst()})}}
function hideInst(){document.getElementById('instBnr').style.display='none'}
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

// === INIT ===
document.addEventListener('DOMContentLoaded',()=>{
  if(navigator.permissions)navigator.permissions.query({name:'camera'}).then(r=>{if(r.state==='granted')reqCam()}).catch(()=>{});
});
</script>
</body>
</html>
